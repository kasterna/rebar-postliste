<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Rebar Postliste</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 12px;
      font-size: 13px;
      color: #222;
    }
    #status {
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 12px;
      background: #eee;
    }
    #status.ok { background: #d4edda; color: #155724; }
    #status.error { background: #f8d7da; color: #721c24; }
    #log {
      white-space: pre-wrap;
      font-family: Consolas, monospace;
      font-size: 12px;
      background: #f5f5f5;
      padding: 8px;
      border-radius: 4px;
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div id="status">Kobler til Trimble Connect...</div>
  <div id="log"></div>

  <script src="vendor/trimbleconnect.workspace.api.js"></script>
  <script>
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `[${time}] ${msg}\n`;
    }

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls || "";
    }

    async function main() {
      try {
        const API = await TrimbleConnectWorkspace.connect(
          window.parent,
          (event, args) => {
            log(`Event mottatt: ${event} ${JSON.stringify(args)}`);
          },
          30000
        );

        window.API = API; // for enkel feilsøking i devtools
        setStatus("Tilkoblet Trimble Connect ✔", "ok");
        log("WorkspaceAPI.connect() lyktes.");
      } catch (err) {
        setStatus("Kunne ikke koble til Trimble Connect ✘", "error");
        log("Feil: " + err.message);
      }
    }

    main();
  </script>
</body>
</html>
