<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Rebar Postliste</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
      font-size: 13px;
      color: #222;
    }
    #status {
      padding: 6px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      background: #eee;
      display: inline-block;
    }
    #status.ok { background: #d4edda; color: #155724; }
    #status.error { background: #f8d7da; color: #721c24; }
    #status.busy { background: #fff3cd; color: #856404; }

    #toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    #refresh-btn {
      padding: 6px 12px;
      cursor: pointer;
    }
    #count {
      font-size: 12px;
      color: #555;
      margin-bottom: 8px;
      display: block;
    }

    #table-container {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #ddd;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid #ddd;
      padding: 4px 6px;
      text-align: left;
    }
    th {
      cursor: pointer;
      background: #f5f5f5;
      user-select: none;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }
    th:hover {
      background: #eaeaea;
    }
    tbody tr {
      cursor: pointer;
    }
    tbody tr:hover {
      background: #e9f2ff;
    }
    tbody tr.selected {
      background: #fff3b0;
      font-weight: bold;
    }

    #log {
      white-space: pre-wrap;
      font-family: Consolas, monospace;
      font-size: 11px;
      background: #f5f5f5;
      padding: 6px;
      border-radius: 4px;
      max-height: 120px;
      overflow-y: auto;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div id="status">Kobler til Trimble Connect...</div>
    <button id="refresh-btn" disabled>Oppdater liste</button>
  </div>
  <span id="count"></span>

  <div id="table-container">
    <table id="rebar-table">
      <thead>
        <tr>
          <th data-key="postnr">Postnr</th>
          <th data-key="count">Antall</th>
          <th data-key="diameter">Diameter</th>
          <th data-key="lengde">Lengde</th>
          <th data-key="formkode">Formkode</th>
          <th data-key="segment">Segment</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="log"></div>

  <script src="vendor/trimbleconnect.workspace.api.js"></script>
  <script src="app.js"></script>
</body>
</html>
